<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" role="img" aria-label="Mauá Automóviles">
  <defs>
    <linearGradient id="lg-chrome-1" x1="0" y1="0" x2="1" y2="0.15">
      <stop offset="0" stop-color="#7a808a"/>
      <stop offset="0.18" stop-color="#eef1f4"/>
      <stop offset="0.38" stop-color="#9aa1ab"/>
      <stop offset="0.55" stop-color="#f6f8fa"/>
      <stop offset="0.75" stop-color="#8c919b"/>
      <stop offset="1" stop-color="#dfe4ea"/>
    </linearGradient>
    <linearGradient id="lg-chrome-2" x1="0" y1="0" x2="1" y2="0.1">
      <stop offset="0" stop-color="#666c76"/>
      <stop offset="0.3" stop-color="#e2e6ea"/>
      <stop offset="0.6" stop-color="#9aa1ab"/>
      <stop offset="1" stop-color="#c7cdd4"/>
    </linearGradient>
    <linearGradient id="lg-red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8f0c1a"/>
      <stop offset="0.45" stop-color="#e2202c"/>
      <stop offset="1" stop-color="#ff5c56"/>
    </linearGradient>
    <linearGradient id="lg-word" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.45" stop-color="#c3c9d2"/>
      <stop offset="0.55" stop-color="#8c919b"/>
      <stop offset="1" stop-color="#eef1f4"/>
    </linearGradient>
  </defs>

  <!-- marca: swoosh -->
  <g transform="translate(108,6)">
    <path fill="url(#lg-red)" d="
      M 22,178
      C 58,142 92,112 118,108
      C 148,102 172,110 192,130
      C 175,122 148,116 122,122
      C 92,130 58,152 22,178"/>
    <path fill="url(#lg-chrome-2)" d="
      M 24,166
      C 62,128 100,95 130,88
      C 175,77 225,85 270,108
      C 250,100 205,82 165,86
      C 120,92 70,122 24,166"/>
    <path fill="url(#lg-chrome-1)" d="
      M 20,160
      C 75,108 135,58 190,42
      C 260,22 340,32 404,90
      C 388,86 320,50 250,52
      C 185,55 120,92 20,160"/>
  </g>

  <!-- wordmark -->
  <text x="320" y="228" text-anchor="middle" fill="url(#lg-word)"
        font-family="Sora, 'Arial Black', Arial, sans-serif" font-weight="700"
        font-size="38" letter-spacing="6">MAUÁ</text>
  <text x="320" y="284" text-anchor="middle" fill="url(#lg-word)"
        font-family="Sora, 'Arial Black', Arial, sans-serif" font-weight="800"
        font-size="46" letter-spacing="1">AUTOMÓVILES</text>

  <!-- línea roja -->
  <rect x="145" y="302" width="350" height="4" rx="2" fill="url(#lg-red)"/>
